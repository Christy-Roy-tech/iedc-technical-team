<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Gallery | IEDC@SAINTGITS</title>
  <meta content="Explore our moments, workshops, and achievements in an immersive 3D gallery experience." name="description" />

  <!-- Favicons -->
  <link href="../assets/img/Icons/favicon.ico" rel="icon" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet" />

  <style>
    :root {
      --bg-deep: #070212;
      --bg-surface: rgba(12, 6, 24, 0.7);
      --accent-warm: #c4515c;
      --accent-glow: #e8626e;
      --accent-soft: rgba(196, 81, 92, 0.15);
      --glass-bg: rgba(18, 10, 32, 0.6);
      --glass-border: rgba(255, 255, 255, 0.06);
      --text-primary: #f1eff5;
      --text-secondary: #9e97ab;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      font-family: 'Poppins', sans-serif;
      color: var(--text-primary);
    }

    /* ── Ambient Background Glow ── */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 70%;
      height: 70%;
      background: radial-gradient(circle, rgba(196, 81, 92, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -15%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(120, 60, 180, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Top Navigation ── */
    .gallery-nav {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(180deg, rgba(7, 2, 18, 0.9) 0%, rgba(7, 2, 18, 0.4) 60%, transparent 100%);
      z-index: 100;
      pointer-events: none;
    }

    .gallery-nav > * {
      pointer-events: auto;
    }

    /* Logo Mark */
    .gallery-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
    }

    .gallery-brand-icon {
      width: 36px;
      height: 36px;
      object-fit: contain;
      filter: drop-shadow(0 0 10px rgba(196, 81, 92, 0.3));
    }

    .gallery-brand-label {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .gallery-brand-label span:first-child {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .gallery-brand-label span:last-child {
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--accent-warm);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Nav Actions */
    .gallery-nav-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      color: var(--text-primary);
      font-size: 0.82rem;
      font-weight: 500;
      text-decoration: none;
      backdrop-filter: blur(16px);
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      letter-spacing: 0.3px;
    }

    .btn-nav:hover {
      background: var(--accent-soft);
      border-color: rgba(196, 81, 92, 0.3);
      color: var(--accent-glow);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(196, 81, 92, 0.15);
    }

    .btn-nav i {
      font-size: 0.9rem;
    }

    /* ── Fullscreen WebGL Canvas ── */
    #gallery-3d-container {
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
      cursor: grab;
    }

    #gallery-3d-container:active {
      cursor: grabbing;
    }

    /* ── Loading Screen ── */
    #gallery-loading-spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 40px 50px;
      background: var(--glass-bg);
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(24px);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
    }

    .spinner-orbit {
      width: 48px;
      height: 48px;
      position: relative;
    }

    .spinner-orbit::before,
    .spinner-orbit::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
    }

    .spinner-orbit::before {
      border-top-color: var(--accent-warm);
      animation: orbit-spin 1s linear infinite;
    }

    .spinner-orbit::after {
      border-right-color: rgba(196, 81, 92, 0.3);
      animation: orbit-spin 1.5s linear infinite reverse;
    }

    @keyframes orbit-spin {
      to { transform: rotate(360deg); }
    }

    .spinner-label {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
    }

    /* ── Minimal Scroll Hint (bottom center) ── */
    .gallery-scroll-hint {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 22px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      backdrop-filter: blur(16px);
      opacity: 0.7;
      transition: opacity 0.5s ease;
      animation: hint-fade 6s ease-in-out forwards;
    }

    .gallery-scroll-hint:hover {
      opacity: 1;
    }

    @keyframes hint-fade {
      0%, 70% { opacity: 0.7; }
      100% { opacity: 0; pointer-events: none; }
    }

    .scroll-hint-icon {
      width: 20px;
      height: 32px;
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      position: relative;
    }

    .scroll-hint-icon::after {
      content: '';
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 8px;
      background: var(--accent-warm);
      border-radius: 3px;
      animation: scroll-dot 1.8s ease-in-out infinite;
    }

    @keyframes scroll-dot {
      0%, 100% { top: 6px; opacity: 1; }
      50% { top: 16px; opacity: 0.3; }
    }

    .scroll-hint-text {
      font-size: 0.72rem;
      color: var(--text-secondary);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .gallery-nav {
        padding: 14px 18px;
      }

      .gallery-brand-label {
        display: none;
      }

      .btn-nav span {
        display: none;
      }

      .btn-nav {
        padding: 10px 14px;
      }

      .gallery-scroll-hint {
        bottom: 16px;
        padding: 8px 16px;
      }

      .scroll-hint-text {
        font-size: 0.65rem;
      }
    }

    @media (max-width: 480px) {
      .gallery-nav {
        padding: 12px 14px;
      }

      .btn-nav {
        padding: 8px 12px;
        font-size: 0.78rem;
      }
    }
  </style>
</head>
<body>

  <!-- Top Navigation -->
  <header class="gallery-nav">
    <a href="../index.html" class="gallery-brand">
      <img src="../assets/img/Icons/favicon.ico" alt="IEDC" class="gallery-brand-icon">
      <div class="gallery-brand-label">
        <span>IEDC @ Saintgits</span>
        <span>Gallery</span>
      </div>
    </a>
    <div class="gallery-nav-actions">
      <a href="./admin/admin.html#portal-manager-section" class="btn-nav">
        <i class="bi bi-gear"></i>
        <span>Admin</span>
      </a>
      <a href="../index.html" class="btn-nav">
        <i class="bi bi-arrow-left"></i>
        <span>Home</span>
      </a>
    </div>
  </header>

  <!-- Loading Indicator -->
  <div id="gallery-loading-spinner">
    <div class="spinner-orbit"></div>
    <span class="spinner-label">Loading gallery...</span>
  </div>

  <!-- Fullscreen WebGL Container -->
  <div id="gallery-3d-container"></div>

  <!-- Minimal Scroll Hint (auto-fades after a few seconds) -->
  <div class="gallery-scroll-hint">
    <div class="scroll-hint-icon"></div>
    <span class="scroll-hint-text">Scroll to explore</span>
  </div>

  <script type="module">
    import { Infinite3DGallery } from '../assets/js/infinite_gallery.js';
    
    window.addEventListener('DOMContentLoaded', () => {
      window.infiniteGalleryInstance = new Infinite3DGallery('gallery-3d-container', {
        speed: 1.3,
        visibleCount: 14
      });
    });
  </script>
</body>
</html>
