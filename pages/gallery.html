<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>3D Infinite Cloth Gallery | IEDC@SAINTGITS</title>
  <meta content="Explore our moments, workshops, and achievements in an immersive 3D infinite cloth and flag waving space." name="description" />

  <!-- Favicons -->
  <link href="../assets/img/Icons/favicon.ico" rel="icon" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet" />

  <style>
    :root {
      --bg-dark: #020617;
      --accent-red: #ef4444;
      --accent-rose: #f43f5e;
      --glass-bg: rgba(15, 23, 42, 0.75);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #180308 0%, #020617 100%);
      font-family: 'Poppins', sans-serif;
      color: #f8fafc;
    }

    /* Top Navigation HUD */
    .gallery-hud-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(180deg, rgba(2, 6, 23, 0.85) 0%, rgba(2, 6, 23, 0) 100%);
      z-index: 100;
      pointer-events: none;
    }

    .gallery-hud-top > * {
      pointer-events: auto;
    }

    .brand-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #ef4444, #f43f5e, #fb7185);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 9999px;
      color: #f8fafc;
      font-weight: 500;
      text-decoration: none;
      backdrop-filter: blur(12px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .btn-back:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: #ef4444;
      color: #fb7185;
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(239, 68, 68, 0.35);
    }

    /* Bottom Instructions HUD */
    .gallery-hud-bottom {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 24px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 9999px;
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 100;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      animation: pulse-border 4s infinite alternate;
    }

    @keyframes pulse-border {
      0% { border-color: rgba(255, 255, 255, 0.1); }
      100% { border-color: rgba(239, 68, 68, 0.55); }
    }

    .hud-text {
      font-size: 0.85rem;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .key-badge {
      padding: 2px 8px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #fb7185;
    }

    /* Fullscreen WebGL Canvas Container */
    #gallery-3d-container {
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
      cursor: grab;
    }

    #gallery-3d-container:active {
      cursor: grabbing;
    }

    /* Loading Spinner */
    #gallery-loading-spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: var(--glass-bg);
      padding: 30px 40px;
      border-radius: 16px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
    }

    .spinner-ring {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ef4444;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Top Navigation -->
  <header class="gallery-hud-top">
    <div class="brand-title">
      <i class="bi bi-layers-fill text-danger"></i>
      <span>3D INFINITE CLOTH GALLERY</span>
    </div>
    <div style="display: flex; gap: 12px; pointer-events: auto;">
      <a href="./admin/admin.html#portal-manager-section" class="vip-admin-nav-chip" style="padding: 8px 20px !important;">
        <i class="bi bi-shield-lock-fill admin-badge-icon"></i>
        <span class="admin-badge-text">Admin Gallery Portal</span>
        <span class="admin-badge-pulse"></span>
      </a>
      <a href="../index.html" class="btn-back">
        <i class="bi bi-arrow-left"></i>
        <span>Back to Home</span>
      </a>
    </div>
  </header>

  <!-- Loading Indicator -->
  <div id="gallery-loading-spinner">
    <div class="spinner-ring"></div>
    <span style="font-size: 0.95rem; font-weight: 500; color: #e2e8f0;">Entering 3D Space...</span>
  </div>

  <!-- Fullscreen WebGL Container -->
  <div id="gallery-3d-container"></div>

  <!-- Bottom Instructions -->
  <div class="gallery-hud-bottom">
    <span class="hud-text">
      <i class="bi bi-mouse-fill text-danger"></i> Scroll or Drag to fly through Z-Space
    </span>
    <span class="hud-text d-none d-md-flex">
      <span class="key-badge">↑</span> <span class="key-badge">↓</span> Arrow Keys
    </span>
    <span class="hud-text">
      <i class="bi bi-flag-fill text-danger"></i> Hover over photos for cloth flag waves
    </span>
  </div>

  <script type="module">
    import { Infinite3DGallery } from '../assets/js/infinite_gallery.js';
    
    window.addEventListener('DOMContentLoaded', () => {
      window.infiniteGalleryInstance = new Infinite3DGallery('gallery-3d-container', {
        speed: 1.3,
        visibleCount: 14
      });
    });
  </script>
</body>
</html>
