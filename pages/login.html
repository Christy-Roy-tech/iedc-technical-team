<!DOCTYPE html>
<html lang="en">
  <head>
    <title>IEDC Admin Login</title>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../assets/img/Icons/favicon.ico" rel="icon" />
    <link href="../assets/css/login.css" rel="stylesheet" />
  </head>

  <body>
    <div class="wrapper active-popup">
      <span class="icon-close">
        <ion-icon name="close"></ion-icon>
      </span>

      <div class="form-box login">
        <h2>Admin Login</h2>
        <form>
          <div class="input-box">
            <span class="icon"><ion-icon name="mail"></ion-icon></span>
            <input id="email2" type="text" required />
            <label>Email</label>
          </div>
          <div class="input-box">
            <span class="icon"><ion-icon id="showpass2" name="eye-off"></ion-icon></span>
            <input id="pass2" type="password" required />
            <label>Password</label>
          </div>
          <div class="remember-forgot">
            <a href="./forgotpass.html" id="forgot">Forgot Password?</a>
          </div>

          <input type="submit" id="login" class="btn" />
          <div class="login-register">
            <span id="login_failed" style="color: red"></span>
            <span id="login_success" style="color: green"></span>
          </div>
        </form>
      </div>
    </div>

    <script
      type="module"
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../assets/js/firebase.js"></script>
    <script type="module" src="../assets/js/login_main.js"></script>

    <script>
      // Password toggle
      document.getElementById("showpass2").onclick = function () {
        var x = document.getElementById("pass2");
        if (x.type === "password") {
          x.type = "text";
          this.setAttribute("name", "eye");
        } else {
          x.type = "password";
          this.setAttribute("name", "eye-off");
        }
      };

      // Close button → go back to homepage
      document.querySelector(".icon-close").addEventListener("click", function () {
        window.location.href = "../index.html";
      });
    </script>
  </body>
</html>
